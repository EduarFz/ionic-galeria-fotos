<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="login-container">

    <ion-item>
      <ion-label position="floating">Usuario</ion-label>
      <ion-input
        type="text"
        [(ngModel)]="usuario"
        placeholder="Ingresa tu usuario">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input
        type="password"
        [(ngModel)]="contrasena"
        placeholder="Ingresa tu contraseña">
      </ion-input>
    </ion-item>

    <ion-button expand="block" class="ion-margin-top" (click)="login()">
      Entrar
    </ion-button>

    <ion-card class="ion-margin-top credenciales-card">
      <ion-card-header>
        <ion-card-title>Credenciales de prueba</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p><strong>Usuario:</strong> admin</p>
        <p><strong>Contraseña:</strong> 1234</p>
      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
