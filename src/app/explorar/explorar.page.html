<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="volver()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Explorar</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="irAFavoritos()">
        <ion-icon slot="icon-only" name="heart-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div *ngIf="cargando" class="ion-text-center ion-padding">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Cargando fotos...</p>
  </div>

  <ion-grid *ngIf="!cargando">
    <ion-row>
      <ion-col size="6" *ngFor="let foto of fotos">
        <ion-card>
          <img [src]="foto.thumbnailUrl" [alt]="foto.title" />
          <ion-card-content>
            <p class="titulo">{{ foto.title }}</p>
            <ion-button
              fill="clear"
              (click)="toggleFavorito(foto)">
              <ion-icon
                slot="icon-only"
                [name]="favoritosService.esFavorito(foto.id) ? 'heart' : 'heart-outline'"
                [color]="favoritosService.esFavorito(foto.id) ? 'danger' : 'medium'">
              </ion-icon>
            </ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
